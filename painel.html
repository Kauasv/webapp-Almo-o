<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Inez - Gestão de Almoço</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            padding: 20px; 
            background: linear-gradient(90deg,rgba(0, 21, 250, 1) 1%, rgba(255, 0, 0, 1) 100%);        margin: 0; padding: 20px;

        }
            
        .container { background: white; 
            padding: 20px; 
            border-radius: 10px; 
            max-width: 600px; 
            margin: 0 auto; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            background-image: url("LOGO.PNG");
            background-size: 160%; 
            background-position: center; 
            background-repeat: no-repeat;
            background-color: rgba(2, 2, 2, 0.525); 
        }
        h2, h3 { 
            color: #ffffff; 
        }
        .secao { 
            background: #05050595; 
            padding: 15px; 
            border-radius: 5px; 
            margin-bottom: 20px; 
            border: 1px solid #e9ecef; 
        }
        label { font-weight: bold; display: block; 
            margin-bottom: 5px; 
        }
        input[type="text"] { width: 100%; 
            padding: 10px; margin-bottom: 10px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            box-sizing: border-box; 
        }
        button { padding: 10px 15px; 
            background-color: #003267; 
            color: white; border: 
            none; border-radius: 5px; 
            cursor: pointer; 
            font-size: 14px; 
        }
        button:hover { 
            background-color: #0056b3; 
        }
        button.btn-sucesso { 
            background-color: #28a745; 
            width: 100%; padding: 12px; 
            font-size: 16px; 
            margin-top: 10px; 
        }
        button.btn-sucesso:hover { 
            background-color: #218838; 
        }
        .lista-pedidos { 
            list-style: none; padding: 0; 
        }
        .lista-pedidos li { 
            padding: 8px; 
            border-bottom: 1px solid #ddd; 
            display: flex; 
            justify-content: space-between; 
            color: #ffffff;
        }
        .resumo-texto { background: #e9ecef;
            padding: 10px; 
            border-radius: 5px; 
            white-space: pre-wrap; 
            font-family: monospace; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Painel de Controle do chefe 𐂐◯𓇋</h2>
    
    <div class="secao">
        <h3>1. Atualizar Ingredientes do Dia</h3>
        <form id="formCardapio">
            <label for="ingredientes">Digite os ingredientes disponíveis hoje (separe por vírgula):</label>
            <textarea id="ingredientes" rows="4" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;" placeholder="Ex: Arroz, Feijão, Macarrão, Carne de Panela, Batata Frita, Almofadinha" required></textarea>
            <br><br>
            <button type="submit" id="btnSalvarCardapio">Salvar e Publicar Cardápio</button>
        </form>
    </div>

    <div class="secao">
        <h3>2. Pedidos Recebidos</h3>
        <ul class="lista-pedidos" id="listaPedidos">
            <li>Carregando pedidos em tempo real...</li>
        </ul>
    </div>

    <div class="secao">
        <h3>3. Resumo para o Restaurante</h3>
        <div class="resumo-texto" id="resumoTexto">Nenhum pedido recebido ainda hoje.</div>
        <button class="btn-sucesso" id="btnCopiar">Copiar Texto para o WhatsApp 📲</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Dados de conexão do Firebase 
    const firebaseConfig = {
        apiKey: "AIzaSyBrfXYmD0DwHD1Lk2Zf9c_Dvc3KrCiAD9A",
        authDomain: "almoco-empresa-7a582.firebaseapp.com",
        projectId: "almoco-empresa-7a582",
        storageBucket: "almoco-empresa-7a582.firebasestorage.app",
        messagingSenderId: "646365633884",
        appId: "1:646365633884:web:acd39ed091832d9ebdb599",
        measurementId: "G-BKJH0N2E6N"
    };

    // Inicializa o Firebase e o Banco de Dados (Firestore)
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Pega a data de hoje formatada (ex: "02-06-2026") para organizar os dados por dia
    const dataHoje = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');

    // Variável global para guardar os pedidos e usar na exportação do Excel
    let listaPedidosGlobal = [];

    // --- LÓGICA 1: SALVAR OS INGREDIENTES NO BANCO ---
    document.getElementById('formCardapio').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSalvarCardapio');
        btn.innerText = "Salvando...";
        btn.disabled = true;

        const textoIngredientes = document.getElementById('ingredientes').value;
        const listaIngredientes = textoIngredientes.split(',').map(item => item.trim()).filter(item => item !== "");

        try {
            await setDoc(doc(db, "cardapios", dataHoje), {
                itens: listaIngredientes,
                data: dataHoje
            });
            alert("Lista de ingredientes publicada com sucesso!");
        } catch (erro) {
            console.error(erro);
            alert("Erro ao salvar.");
        } finally {
            btn.innerText = "Salvar e Publicar Cardápio";
            btn.disabled = false;
        }
    });

    // --- LOGICA 2: OUVIR OS PEDIDOS EM TEMPO REAL ---
    const q = query(collection(db, "pedidos"), where("data", "==", dataHoje));
    
    onSnapshot(q, (snapshot) => {
        const listaUl = document.getElementById('listaPedidos');
        listaUl.innerHTML = ""; 

        if (snapshot.empty) {
            listaUl.innerHTML = "<li>Nenhum pedido feito hoje ainda.</li>";
            document.getElementById('resumoTexto').innerText = "Nenhum pedido recebido ainda hoje.";
            listaPedidosGlobal = []; // Limpa a lista global
            return;
        }

        listaPedidosGlobal = []; // Limpa antes de repopular
        const contagem = {};

        // 1. ALTERAÇÃO DO TEXTO DO WHATSAPP: Começa o cabeçalho do texto
        let textoFinal = `*Pedidos de Almoço - Empresa Hidraup (${new Date().toLocaleDateString()})*\n\n`;

        snapshot.forEach((doc) => {
            const dadosPedido = doc.data();
            listaPedidosGlobal.push(dadosPedido); // Salva para o Excel

            // Adiciona na lista visual da tela da Inez
            const li = document.createElement('li');
            li.innerHTML = `<span>${dadosPedido.nome}</span> <b>${dadosPedido.prato}</b>`;
            listaUl.appendChild(li);

            // 1. ALTERAÇÃO DO TEXTO DO WHATSAPP: Coloca o Nome na frente do Pedido/Marmita
            // Cada linha vai ficar: "• João Silva: [Marmita G] - Arroz, Carne"
            textoFinal += `• *${dadosPedido.nome}:* ${dadosPedido.prato}\n`;

            // Soma para o resumo de totais por tipo (se a Inez ainda quiser ver os totais no fim do texto)
            contagem[dadosPedido.prato] = (contagem[dadosPedido.prato] || 0) + 1;
        });

        // Adiciona o total de marmitas no fim do texto do WhatsApp
        textoFinal += `\n*Total de pedidos:* ${listaPedidosGlobal.length}`;
        
        // Exibe o texto atualizado na caixinha cinza para a Inez copiar
        document.getElementById('resumoTexto').innerText = textoFinal;
    });

    // Botão de copiar texto do WhatsApp
    document.getElementById('btnCopiar').addEventListener('click', function() {
        const texto = document.getElementById('resumoTexto').innerText;
        navigator.clipboard.writeText(texto);
        alert("Resumo copiado! Pronto para colar no WhatsApp do restaurante.");
    }); 

    // --- LÓGICA 3: EXPORTAR PARA EXCEL (NOVA FUNÇÃO) ---
    // Cria e adiciona o botão de Excel via código na página para não quebrar seu HTML
    const btnExcel = document.createElement('button');
    btnExcel.innerText = "Exportar para Excel 📊";
    btnExcel.style.backgroundColor = "#1d6f42"; // Verde do Excel
    btnExcel.style.marginTop = "10px";
    btnExcel.style.width = "100%";
    btnExcel.style.padding = "12px";
    btnExcel.style.fontSize = "16px";
    btnExcel.style.color = "white";
    btnExcel.style.border = "none";
    btnExcel.style.borderRadius = "5px";
    btnExcel.style.cursor = "pointer";
    
    // Insere o botão logo abaixo do botão do WhatsApp no painel
    document.getElementById('btnCopiar').parentNode.appendChild(btnExcel);

    btnExcel.addEventListener('click', function() {
        if (listaPedidosGlobal.length === 0) {
            alert("Não há pedidos hoje para exportar!");
            return;
        }

        // Monta o conteúdo do arquivo usando formato CSV (que o Excel abre perfeitamente)
        // O caractere '\ufeff' serve para o Excel entender os acentos (UTF-8) corretamente no Windows
        let csvConteudo = "\ufeff";
        csvConteudo += "Nome;Marmita e Ingredientes;Horário\n"; // Cabeçalho do Excel

        // Preenche as linhas com os dados de cada funcionário
        listaPedidosGlobal.forEach(p => {
            csvConteudo += `"${p.nome}";"${p.prato}";"${p.horario}"\n`;
        });

        // Cria o arquivo para download no navegador
        const blob = new Blob([csvConteudo], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        link.setAttribute("href", url);
        link.setAttribute("download", `pedidos_hidraup_${dataHoje}.csv`);
        link.style.visibility = 'hidden';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
</script>

</body>
</html>
